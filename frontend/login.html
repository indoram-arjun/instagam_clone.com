<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Instagram Clone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Instagram Clone</h1>
      <p class="muted">Sign in to see posts from people you follow.</p>

      <form id="loginForm" class="stacked-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button class="primary-button" type="submit">Login</button>
        <p id="authMessage" class="form-message" role="status"></p>
      </form>

      <p class="switch-link">New here? <a href="register.html">Create an account</a></p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
