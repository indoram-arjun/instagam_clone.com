<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Instagram Clone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Create Account</h1>
      <p class="muted">Join the clone and start sharing posts.</p>

      <form id="registerForm" class="stacked-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>

        <button class="primary-button" type="submit">Register</button>
        <p id="authMessage" class="form-message" role="status"></p>
      </form>

      <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
